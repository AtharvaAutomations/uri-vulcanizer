services:
  db:
    image: postgres:15
    container_name: vulcanizer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build: ./backend
    container_name: vulcanizer-backend
    restart: unless-stopped
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: sh -c "npx prisma db push && node dist/main.js"

  plc-service:
    build: ./plc-service
    container_name: vulcanizer-plc
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      BACKEND_URL: http://backend:3000
    command: sh -c "sleep 10 && node dist/plc.js"

  frontend:
    build: ./frontend
    container_name: vulcanizer-frontend
    restart: unless-stopped
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: vulcanizer-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
